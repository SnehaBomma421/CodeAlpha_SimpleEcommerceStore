<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ShopVerse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" type="image/x-icon">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="navbar-brand"><span class="brand-icon">🛒</span> ShopVerse Admin</a>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <div class="navbar-links" id="navbarLinks">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="/products" class="nav-link"><i class="fas fa-store"></i> <span>Products</span></a>
        <a href="/profile" class="nav-link"><i class="fas fa-user"></i> <span>Profile</span></a>
        <button id="adminLogoutBtn" class="btn btn-small btn-danger">Logout</button>
      </div>
    </div>
  </nav>

  <div class="admin-page">
    <div class="container">
      <div class="admin-header">
        <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
        <span id="adminWelcome" style="color:var(--text-secondary);"></span>
      </div>

      <div id="adminLoginPrompt" style="text-align:center;padding:80px 20px;">
        <div style="font-size:4rem;margin-bottom:20px;">🔐</div>
        <h2>Admin Login</h2>
        <p style="color:var(--text-muted);margin-bottom:20px;">Please login with admin credentials to continue.</p>
        <button class="btn btn-primary" onclick="window.location.href='/login'">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </div>

      <div id="adminContent" style="display:none;">
        <!-- Admin Tabs -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="products"><i class="fas fa-box"></i> Products</button>
          <button class="admin-tab" data-tab="orders"><i class="fas fa-truck"></i> Orders</button>
          <button class="admin-tab" data-tab="add-product"><i class="fas fa-plus-circle"></i> Add Product</button>
        </div>

        <!-- Products Tab -->
        <div id="adminProductsTab" class="admin-tab-content">
          <div style="overflow-x:auto;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Rating</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="adminProductsBody">
                <!-- Loaded dynamically -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Orders Tab -->
        <div id="adminOrdersTab" class="admin-tab-content" style="display:none;">
          <div style="overflow-x:auto;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Payment</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="adminOrdersBody">
                <!-- Loaded dynamically -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Add Product Tab -->
        <div id="adminAddProductTab" class="admin-tab-content" style="display:none;">
          <h2 style="margin-bottom:20px;">Add New Product</h2>
          <form id="addProductForm" style="max-width:600px;">
            <div class="form-group">
              <label>Product Title *</label>
              <input type="text" id="prodTitle" required>
            </div>
            <div class="form-group">
              <label>Description *</label>
              <textarea id="prodDescription" rows="4" required></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Category *</label>
                <input type="text" id="prodCategory" placeholder="e.g. Electronics" required>
              </div>
              <div class="form-group">
                <label>Price *</label>
                <input type="number" id="prodPrice" min="0" step="0.01" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Stock</label>
                <input type="number" id="prodStock" value="10" min="0">
              </div>
              <div class="form-group">
                <label>Rating (0-5)</label>
                <input type="number" id="prodRating" value="0" min="0" max="5" step="0.1">
              </div>
            </div>
            <div class="form-group">
              <label>Image URL</label>
              <input type="url" id="prodImage" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
              <label>Featured Product</label>
              <input type="checkbox" id="prodFeatured">
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Product</button>
          </form>
        </div>

        <!-- Edit Product Modal -->
        <div class="modal-overlay" id="editModal">
          <div class="modal">
            <button class="close-modal" id="closeEditModal">&times;</button>
            <h2>Edit Product</h2>
            <form id="editProductForm">
              <input type="hidden" id="editProdId">
              <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="editTitle" required>
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea id="editDescription" rows="4" required></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Category</label>
                  <input type="text" id="editCategory" required>
                </div>
                <div class="form-group">
                  <label>Price</label>
                  <input type="number" id="editPrice" min="0" step="0.01" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Stock</label>
                  <input type="number" id="editStock" min="0">
                </div>
                <div class="form-group">
                  <label>Rating</label>
                  <input type="number" id="editRating" min="0" max="5" step="0.1">
                </div>
              </div>
              <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="editImage">
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Product</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
