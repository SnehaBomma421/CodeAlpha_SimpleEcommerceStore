<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopVerse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" type="image/x-icon">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="navbar-brand"><span class="brand-icon">🛒</span> ShopVerse</a>
      <a href="/products" class="nav-link"><i class="fas fa-store"></i> <span>Products</span></a>
      <a href="/cart" class="nav-link"><i class="fas fa-shopping-cart"></i> <span>Cart</span><span class="cart-count" id="cartCountNav">0</span></a>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <div class="navbar-links" id="navbarLinks">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="/login" class="nav-link"><i class="fas fa-user"></i> <span>Login</span></a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Join ShopVerse today</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-links">
        Already have an account? <a href="/login">Sign In</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
