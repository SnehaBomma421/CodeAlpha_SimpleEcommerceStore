<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success - ShopVerse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" type="image/x-icon">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="navbar-brand"><span class="brand-icon">🛒</span> ShopVerse</a>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <div class="navbar-links" id="navbarLinks">
        <a href="/" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="/products" class="nav-link"><i class="fas fa-store"></i> <span>Products</span></a>
        <a href="/profile" class="nav-link"><i class="fas fa-user"></i> <span>My Account</span></a>
      </div>
    </div>
  </nav>

  <div class="order-success-page">
    <div class="container">
      <div class="success-icon">✅</div>
      <h1>Order Placed Successfully!</h1>
      <p class="order-id-display">Order ID: <strong id="successOrderId">ORD-XXXX</strong></p>
      <p class="delivery-info">
        <i class="fas fa-truck" style="margin-right:6px;"></i>
        Estimated Delivery: <strong id="successDeliveryDate">Within 7 days</strong>
      </p>
      <p style="color:var(--text-muted);margin-bottom:30px;">Thank you for shopping with ShopVerse! You will receive an email confirmation shortly.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="/profile" class="btn btn-primary"><i class="fas fa-user"></i> View My Orders</a>
        <a href="/products" class="btn btn-secondary"><i class="fas fa-store"></i> Continue Shopping</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
